version: '3.7'
services:
  ms_server:
      container_name: "msql_server"
      build: 
        context: .
        dockerfile: MS_SQL/dockerfile
      ports:  
        - "5000-5005:1433"
      env_file:
        - MS_SQL/sqlserver.env
        - MS_SQL/sapassword.env
  jenkins:
      container_name: "jenkins"
      image: jenkins/jenkins:lts
      ports: 
        - "8080:8080"
        - "50000:50000"
